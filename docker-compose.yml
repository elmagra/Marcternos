version: '3.8'

services:
  panel-minecraft:
    build: .
    container_name: panel-minecraft
    stdin_open: true
    tty: true
    ports:
      - "3000:3000"         # Frontend & API
      - "25565:25565"       # Minecraft port (can be changed in server.properties)
      - "25565:25565/udp"   # Optional Bedrock/Geyser UDP forwarding
    volumes:
      - ./data/servers:/app/data/servers
    environment:
      - PORT=3000
      - MULTI_INSTANCE_ENABLED=true
      - DYNAMIC_CATALOG_ENABLED=true
      - SERVERS_ROOT=/app/data/servers
      - PANEL_ROOT=/app/
      - JAVA_PATH=java
      - JAVA_ARGS=-XX:MaxRAMPercentage=90.0 -XX:+UseG1GC
      - PUBLIC_PORT=25565
      - MC_PUBLIC_PORT=25565
      # - PUBLIC_HOST=100.x.y.z  # opcional: fija aqui tu IP Tailscale externa
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    restart: unless-stopped
